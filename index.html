<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแจ้งซ่อม Online</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
}

iframe{
width:100%;
height:100%;
border:none;
}
</style>

</head>

<body>

<iframe id="formframe"></iframe>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

function runApp(){

liff.getProfile().then(profile => {

let userId = profile.userId;
let displayName = encodeURIComponent(profile.displayName);
let pictureUrl = encodeURIComponent(profile.pictureUrl);

let url = "https://script.google.com/macros/s/AKfycbyTxYZ29Z6VpRR9YJmTqeEH6ybUfsdXmdHTR7leMgN1AFAu21Xp0_cDCiMg7D-IFF7aqA/exec"
+ "?userId=" + userId
+ "&displayName=" + displayName
+ "&pictureUrl=" + pictureUrl;

document.getElementById("formframe").src = url;

});

}

liff.init({ liffId:"2009390223-MxME94q7" }, () => {

if(liff.isLoggedIn()){
runApp();
}else{
liff.login();
}

});

</script>

</body>
</html>
